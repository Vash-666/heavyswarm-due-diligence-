# HeavySwarm Agent Configuration
# Defines model assignments, parameters, and fallback chains for all agents

# =============================================================================
# Supported Models
# =============================================================================
# OpenAI Models:
#   - gpt-4o: General purpose, fast, cost-effective
#   - gpt-4o-mini: Lightweight tasks
#   - gpt-4-turbo: Complex reasoning
#   - o1-preview: Advanced reasoning (slow)
#   - o1-mini: Fast reasoning
#
# Anthropic Models:
#   - claude-3-5-sonnet-20241022: Balanced performance (RECOMMENDED)
#   - claude-3-opus-20240229: Complex analysis
#   - claude-3-haiku-20240307: Fast, lightweight
#
# xAI Grok Models:
#   - grok-4.20-reasoning: Complex reasoning with extended thinking
#   - grok-4.3: Balanced performance for general tasks
#   - grok-2: Fast and cost-effective
# =============================================================================

agents:
  # ==========================================================================
  # Phase 0: Question Generator
  # ==========================================================================
  question_generator:
    model: claude-3-5-sonnet-20241022
    temperature: 0.3
    max_tokens: 4000
    timeout_seconds: 30
    retry_attempts: 3
    description: "Generates targeted questions for research phase"
    
  # ==========================================================================
  # Phase 1: Researcher
  # ==========================================================================
  researcher:
    model: gpt-4o
    temperature: 0.2
    max_tokens: 8000
    timeout_seconds: 60
    retry_attempts: 3
    description: "Parallel research across multiple data sources"
    max_parallel: 4
    
  # ==========================================================================
  # Phase 2: Financial Analyst
  # ==========================================================================
  financial_analyst:
    model: claude-3-5-sonnet-20241022
    temperature: 0.1
    max_tokens: 6000
    timeout_seconds: 45
    retry_attempts: 3
    description: "Financial modeling and valuation analysis"
    
  # ==========================================================================
  # Phase 2: Risk Analyst (Parallel with Financial)
  # ==========================================================================
  risk_analyst:
    model: claude-3-5-sonnet-20241022
    temperature: 0.2
    max_tokens: 5000
    timeout_seconds: 45
    retry_attempts: 3
    description: "Risk assessment and scenario analysis"
    
  # ==========================================================================
  # Phase 3: Strategist
  # ==========================================================================
  strategist:
    # Grok reasoning model for complex scenario analysis
    model: grok-4.20-reasoning
    temperature: 0.3
    max_tokens: 6000
    timeout_seconds: 60
    retry_attempts: 3
    description: "Scenario analysis with devil's advocate reasoning"
    fallback_chain:
      - grok-4.20-reasoning
      - claude-3-5-sonnet-20241022
      - gpt-4o
    
  # ==========================================================================
  # Phase 4: Verifier
  # ==========================================================================
  verifier:
    # Grok reasoning model for fact-checking and bias detection
    model: grok-4.20-reasoning
    temperature: 0.1
    max_tokens: 8000
    timeout_seconds: 60
    retry_attempts: 3
    description: "Fact-checking, bias detection, and confidence scoring"
    fallback_chain:
      - grok-4.20-reasoning
      - claude-3-5-sonnet-20241022
      - gpt-4o
    
  # ==========================================================================
  # Phase 5: Writer
  # ==========================================================================
  writer:
    model: claude-3-5-sonnet-20241022
    temperature: 0.2
    max_tokens: 10000
    timeout_seconds: 60
    retry_attempts: 3
    description: "Investment memo generation"
    
  # ==========================================================================
  # Quality Gate: Quality Guardian
  # ==========================================================================
  quality_guardian:
    model: gpt-4o
    temperature: 0.1
    max_tokens: 4000
    timeout_seconds: 30
    retry_attempts: 2
    description: "Quality gate evaluation and approval"

# =============================================================================
# Model Pricing Reference (USD per 1K tokens)
# =============================================================================
pricing:
  # OpenAI
  gpt-4o:
    input: 0.005
    output: 0.015
  gpt-4o-mini:
    input: 0.00015
    output: 0.0006
  gpt-4-turbo:
    input: 0.01
    output: 0.03
  o1-preview:
    input: 0.015
    output: 0.06
  o1-mini:
    input: 0.003
    output: 0.012
  
  # Anthropic
  claude-3-5-sonnet-20241022:
    input: 0.003
    output: 0.015
  claude-3-opus-20240229:
    input: 0.015
    output: 0.075
  claude-3-haiku-20240307:
    input: 0.00025
    output: 0.00125
  
  # xAI Grok
  grok-4.20-reasoning:
    input: 0.015
    output: 0.075
  grok-4.3:
    input: 0.005
    output: 0.015
  grok-2:
    input: 0.002
    output: 0.010

# =============================================================================
# Rate Limits (requests per minute / tokens per minute)
# =============================================================================
rate_limits:
  gpt-4o: [500, 2000000]
  gpt-4o-mini: [500, 2000000]
  claude-3-5-sonnet-20241022: [4000, 4000000]
  claude-3-opus-20240229: [4000, 4000000]
  grok-4.20-reasoning: [1000, 2000000]
  grok-4.3: [2000, 4000000]
  grok-2: [3000, 6000000]

# =============================================================================
# Model Selection Guidelines
# =============================================================================
guidelines:
  reasoning_tasks:
    # Tasks requiring complex reasoning benefit from Grok's reasoning model
    recommended: grok-4.20-reasoning
    fallback: claude-3-5-sonnet-20241022
    use_cases:
      - Scenario analysis (strategist)
      - Fact-checking and verification
      - Bias detection
      - Complex multi-step reasoning
      
  balanced_tasks:
    # General purpose tasks
    recommended: claude-3-5-sonnet-20241022
    fallback: grok-4.3
    use_cases:
      - Financial analysis
      - Risk assessment
      - Research synthesis
      
  fast_tasks:
    # Tasks requiring quick response
    recommended: grok-2
    fallback: gpt-4o-mini
    use_cases:
      - Question generation
      - Quick lookups
      - Simple transformations
      
  creative_tasks:
    # Tasks requiring nuanced output
    recommended: claude-3-5-sonnet-20241022
    fallback: gpt-4o
    use_cases:
      - Memo writing
      - Summary generation
      - Presentation of findings
